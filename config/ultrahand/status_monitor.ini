[status-monitor]
key_combo=L+DDOWN+RSTICK
battery_avg_iir_filter=false
battery_time_left_refreshrate=60
[full]
refresh_rate=1
layer_width_align=left
show_real_freqs=true
show_deltas=true
show_target_freqs=true
show_fps=true
show_res=true
[mini]
refresh_rate=1
layer_width_align=left
layer_height_align=top
handheld_font_size=15
docked_font_size=15
real_freqs=true
real_volts=false
show=CPU+GPU+RAM+TEMP+DRAW+FAN+FPS+RES
replace_MB_with_RAM_load=true
[micro]
refresh_rate=1
layer_height_align=top
handheld_font_size=13
docked_font_size=13
text_align=center
battery_color=#0FDF
real_freqs=true
real_volts=false
show_full_cpu=true
show=FPS+CPU+GPU+RAM+SOC+PCB+SKIN+FAN+PWR+BAT
replace_GB_with_RAM_load=true
[fps-counter]
layer_width_align=left
layer_height_align=top
handheld_font_size=20
docked_font_size=20
text_color=#0FDF
background_color=#1117
[fps-graph]
layer_width_align=left
layer_height_align=top
max_fps_text_color=#FFFF
min_fps_text_color=#FFFF
background_color=#1117
fps_counter_color=#888C
border_color=#0FDF
dashed_line_color=#CCCC
main_line_color=#FFFF
rounded_line_color=#F0FF
perfect_line_color=#0C0F
show_info=true
[game_resolutions]
refresh_rate=10
layer_width_align=left
layer_height_align=top